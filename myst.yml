version: 1
project:
  title: HDCRS V2 – Halbeeg Daily Construction Reporting System
  copyright: '2026 Halbeeg AEC'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  github: halbeeghdcrs-lab/HALBEEG-HDCRS
  thebe:                  # remove if not needed, but harmless
    binder:
      repo: halbeeghdcrs-lab/HALBEEG-HDCRS
      provider: github
      url: https://mybinder.org
      ref: main
  toc:
    - file: index.md
    - title: Proposal
      file: pages/proposal.md
    - title: Technical Specification
      file: pages/technical-spec.md
    - title: Blog
      file: blog.md
      children:
        - file: tags/hdcrs.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    folders: true
    style: custom.css
  template: book-theme
  parts:
    primary_sidebar_footer: ''